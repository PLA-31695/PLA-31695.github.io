<!DOCTYPE html>
<html>
<head>
	<title>jhg</title>
    <link href="assets/bootstrap/css/bootstrap.min.css" rel="stylesheet" media="screen">
    <link rel="stylesheet" href="css/animate.min.css">
    <link href="assets/css/font-awesome.min.css" rel="stylesheet" media="screen">
    <link href="assets/css/simple-line-icons.css" rel="stylesheet" media="screen">
	<script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
	<style type="text/css">
		*{
			padding: 0;
			margin: 0
		}
        body{
            font: 300 14px/1.8 'Raleway', sans-serif;
            overflow-x: hidden;
            color: #666;
        }
		 #home {
            background: url(http://up.enterdesk.org/pic/dc/a0/75/dca075109211e7fc7accc6cb22fbe125.jpg);
            background-color: #222;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-position: 50% 50%;
            -webkit-background-size: cover;
            -moz-background-size: cover;
            -o-background-size: cover;
            background-size: cover;
            padding: 0;

        }
        #service{
            
        }
        
        .intro {
        	color: white;
        	text-align: center;
        	position: absolute;
        	width: 100%;
            top: 50%;

        }
         .intro h1 {
            font-weight: 800;
            letter-spacing: 5px;
            margin: 5px 0 5px 0;
            font-size: 40px
         }
         .start{
            font-family: Raleway, "Times New Roman", Times, sans-serif;
            
         }
        .scroll-down{
            width: 50px;
            height: 50px;
            bottom: 40px;
            position: absolute;
            left: 50%;
            text-align: center;
            color: #fff;
            border-radius: 50%;
            border:2px solid #fff
        }
        .scroll-down span{
            position: relative;
            animation: drop;
            animation-duration: 1s;
            animation-delay: 0s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }
        @keyframes drop{
            0%   { top: 0px;  opacity: 0;}
            50%  { top: 10px; opacity: 1;}
            100% { top: 25px; opacity: 0;}    
            }
        .pfblock {
            text-align: center;
            padding: 120px 0 100px;
           
        }
        .pfblock-grey{
             background : #f5f5f5;
        }
        .pfblock-title{
            margin: 0 0 30px;
        }
        .pfblock-title h2{
            font : 700 40px/1.2 Raleway, sans-serif;
            font-size: 30px;
            font-weight: 800;
        }
        .pfblock-subtitle{
           margin: 5px 0 60px 0;
           font-family: Raleway, "Times New Roman", Times, sans-serif;
           font-size: 18px; 
        }
        .iconbox{
            background: #fff;
            padding: 40px 20px;
        }
        .iconbox-text{
            margin: 0 0 15px;
        }
        .iconbox-text h3{
            font-size: 13px;
            font-weight: 700  
        }
        .iconbox-icon{
            font-size: 32px;
            color: #222;
        }
        .grid figure{
            
            min-width: 100%;
            max-width: 100%;
            margin: 10px 1%;
        }
        .grid figure img {
            max-width: 100%;
        }
        .grid figure h2 {
            word-spacing: -0.15em;
            font-weight: 300;
        }

        .grid figure h2 span {
            font-weight: 800;
        }
        .grid figcaption{
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        figure.effect-bubba{
            background : #9e5406;
        }
        .btn{
           font-family: Raleway, sans-serif;
           font-size: 13px;
           letter-spacing: 1px;
        }
        .btn-lg{
            padding: 10px 25px;
            background: rgba(17, 17, 17, 0.8);
            color: #fff;
        }
	</style>
</head>
<body>
     <section id="home" class="pfblock-image screen-height">
     <div class="home-overlay">
         	<div class="intro">
     		<div class="start">Hello my name is 蒋洪光 and I am</div>
     		<h1>FULL STACK WEB DEVELOPER</h1>
     		<div class="start">creating modern and responsive Web Application</div>
     	</div>
     </div>
     <a href="#service">
        <div class="scroll-down">
            <span>
                <i class="fa fa-angle-down fa-2x"></i>
            </span>
        </div>
     </a>
     </section>
     <!-- home end -->
</body>

<script type="text/javascript">

		 $(".screen-height").height($(window).height());

		$(window).resize(function(){
			$(".screen-height").height($(window).height());
		});
		
	</script>
</html>
